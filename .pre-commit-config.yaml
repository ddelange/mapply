repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.21
  hooks:
  - id: ruff-check
    args: [--fix, --exit-non-zero-on-fix]
  - id: ruff-format

- repo: https://github.com/astral-sh/ty-pre-commit
  rev: v0.0.58
  hooks:
  - id: ty
    args: [--all-extras]

# should be replaced in the future ref https://github.com/astral-sh/ruff/issues/12434
- repo: https://github.com/jsh9/pydoclint
  rev: 0.9.1
  hooks:
  - id: pydoclint

- repo: https://github.com/Yelp/detect-secrets
  # for new repo init run: `detect-secrets scan > .secrets.baseline`
  rev: v1.5.0
  hooks:
  - id: detect-secrets
    args: [--baseline, .secrets.baseline]
    exclude: .*/tests/.*
    additional_dependencies: [gibberish-detector]

# should be replaced in the future ref https://github.com/astral-sh/ruff/issues/3792
- repo: https://github.com/asottile/blacken-docs
  rev: 1.20.0
  hooks:
  - id: blacken-docs
    additional_dependencies: [black==26.5.1]

- repo: https://github.com/pappasam/toml-sort
  rev: v0.24.4
  hooks:
  - id: toml-sort-fix
    args: [--trailing-comma-inline-array]

- repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
  rev: 0.2.3
  hooks:
  - id: yamlfmt
    args: [--mapping=2, --sequence=2, --offset=0, --implicit_start]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: mixed-line-ending
    args: [--fix=lf]
  - id: trailing-whitespace
  - id: end-of-file-fixer
    exclude: \.(svg)$
  - id: check-merge-conflict
  - id: check-json
  - id: check-toml
  - id: check-xml
  - id: check-yaml
  - id: debug-statements

- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 0.37.4
  hooks:
  - id: check-dependabot
  - id: check-github-workflows
